apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: anonymizer
  namespace: noborders
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: anonymizer
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Gradual scale-down — avoid thrashing on short traffic spikes
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
