name: nobordershealthcare
options:
  bundleIdPrefix: com.valeriy
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 6.2
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    # Service URLs — overridden per build configuration below.
    # Read in Swift via AppConfig (ios/Sources/.../Core/AppConfig.swift).
    # NEVER hardcode these URLs in source — always use AppConfig.*
    API_BASE_URL: https://api.noborders.healthcare
    APP_BASE_URL: https://app.noborders.health
    PHYSICIAN_VIEW_URL: https://scan.noborders.healthcare
  configs:
    Debug:
      API_BASE_URL: http://localhost:8080
      APP_BASE_URL: http://localhost:3000
      PHYSICIAN_VIEW_URL: http://localhost:8083
    Release:
      API_BASE_URL: https://api.noborders.healthcare
      APP_BASE_URL: https://app.noborders.health
      PHYSICIAN_VIEW_URL: https://scan.noborders.healthcare

targets:
  nobordershealthcare:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
        excludes:
          - "**/*.md"
      - path: Sources/nobordershealthcare
        excludes:
          - "**/*.md"
      # SHA3Kit + KyberKit compiled directly into the app target.
      # `import SHA3Kit` / `import KyberKit` removed from all callers —
      # types are in the same module; no import statement needed.
      - path: Sources/SHA3Kit
      - path: Sources/KyberKit
      # SentencePieceC stubs — lets xLMEngine.swift compile without the
      # xcframework; opus-mt tokeniser is a no-op at simulator build time.
      - path: Shims
    resources:
      - path: App/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valeriy.nobordershealthcare
        INFOPLIST_FILE: App/Info.plist
        SWIFT_VERSION: 6.2
        # "minimal" keeps Swift 6.2 strict concurrency from blocking the build
        # while the actor/Sendable audit is ongoing.  Tighten to "complete" later.
        SWIFT_STRICT_CONCURRENCY: minimal
        # Simulator build — code signing not required
        CODE_SIGNING_ALLOWED: NO
    dependencies: []
    info:
      path: App/Info.plist
      properties:
        CFBundleName: nobordershealthcare
        CFBundleDisplayName: "#nobordershealthcare"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # Service URL build variables — resolved at build time per configuration.
        # Swift: use AppConfig.* — NEVER read these keys directly in source.
        API_BASE_URL: $(API_BASE_URL)
        APP_BASE_URL: $(APP_BASE_URL)
        PHYSICIAN_VIEW_URL: $(PHYSICIAN_VIEW_URL)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Scan medical documents"
        NSFaceIDUsageDescription: "Secure vault access"
        NSLocalNetworkUsageDescription: "P2P health record backup"
