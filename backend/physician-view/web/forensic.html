<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <!-- No server-side cache — restricted military record -->
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <!-- Robots: this page must not be indexed -->
  <meta name="robots" content="noindex, nofollow">
  <title>Forensic ID Record — Restricted</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<!--
  data-view="forensic" tells app.js to render the forensic overlay
  instead of the standard emergency card after clinician verification.
-->
<body data-view="forensic">

  <!-- ── Loading ─────────────────────────────────────────────── -->
  <div id="view-loading" class="view active" role="status" aria-label="Loading">
    <div class="spinner"></div>
  </div>

  <!-- ── Error ───────────────────────────────────────────────── -->
  <div id="view-error" class="view" role="alert" aria-live="assertive">
    <div class="error-card">
      <div class="error-icon" aria-hidden="true">⚠</div>
      <h1 id="error-title"></h1>
      <p id="error-msg"></p>
    </div>
  </div>

  <!-- ── Clinician verification gate ────────────────────────── -->
  <!-- Same gate as emergency.html; app.js re-renders for forensic view -->
  <div id="view-verify" class="view" role="main"></div>

  <!-- ── Forensic card ───────────────────────────────────────── -->
  <!-- Injected by app.js renderForensicOverlay() after verification -->
  <div id="view-card" class="view" role="main" aria-live="polite"></div>

  <!-- ── Blur overlay ────────────────────────────────────────── -->
  <div id="blur-overlay" class="blur-overlay hidden"
       role="alert" aria-live="assertive">
    <div class="blur-icon" aria-hidden="true">🔒</div>
    <div class="blur-msg" id="blur-msg"></div>
  </div>

  <!-- ── Expired overlay ─────────────────────────────────────── -->
  <div id="expired-overlay" class="expired-overlay hidden" role="alert">
    <div class="expired-card">
      <div class="expired-icon" aria-hidden="true">⏰</div>
      <h2 id="expired-title">QR Expired</h2>
      <p id="expired-msg">Ask the patient to refresh the QR code.</p>
    </div>
  </div>

  <!-- QR modal (same as emergency.html) -->
  <div id="qr-modal" class="qr-modal" role="dialog" aria-modal="true"
       aria-label="QR Code Scanner">
    <video id="qr-video" autoplay playsinline muted></video>
    <div class="qr-viewfinder" aria-hidden="true"></div>
    <div class="qr-hint" id="qr-hint"></div>
    <button class="qr-close-btn" id="qr-close-btn" aria-label="Close">✕</button>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/qr.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .catch(function () {});
      });
    }
  </script>
</body>
</html>
